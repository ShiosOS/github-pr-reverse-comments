name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate manifest.json parses
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8'))"

      - run: npm run lint

      - run: npm run format:check

      - run: npm test

      - run: npm run build
