<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PR Reverse Comments</title>
    <style>
      body {
        font:
          13px -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        width: 220px;
        margin: 0;
        padding: 12px;
        background: #0d1117;
        color: #c9d1d9;
      }
      h1 {
        font-size: 13px;
        margin: 0 0 8px 0;
      }
      p {
        margin: 0 0 10px 0;
        color: #8b949e;
        font-size: 11px;
      }
      .row {
        display: flex;
        gap: 6px;
      }
      button {
        flex: 1;
        padding: 6px 8px;
        background: #21262d;
        color: #c9d1d9;
        border: 1px solid #30363d;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
      }
      button.active {
        background: #1f6feb;
        border-color: #1f6feb;
        color: #fff;
      }
      button:hover:not(.active) {
        background: #30363d;
      }
    </style>
  </head>
  <body>
    <h1>PR comment order</h1>
    <p>Choose the order for GitHub PR conversation comments and commits.</p>
    <div class="row">
      <button id="newest">Newest first</button>
      <button id="oldest">Oldest first</button>
    </div>
    <script src="constants.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
